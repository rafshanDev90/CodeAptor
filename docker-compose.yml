
services:
  codeaptor-bot:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: codeaptor-app
    restart: unless-stopped
    ports:
      - "${PORT:-8443}:${PORT:-8443}"
    env_file:
      - ./server/.env
    environment:
      - NODE_ENV=production
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:${PORT:-8443}/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
