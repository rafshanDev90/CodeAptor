name: CD Pipeline - Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            echo "⚡ Starting deployment on VPS..."
            
            # Navigate to the project directory (ensure this path matches your VPS setup)
            cd /var/www/amz/CodeAptor
            
            echo "📥 Fetching latest code changes..."
            git pull origin main
            
            echo "🐳 Rebuilding and starting Docker containers..."
            docker compose down --remove-orphans
            docker compose up --build -d
            
            echo "🧹 Cleaning up dangling Docker images to free space..."
            docker image prune -f
            
            echo "🚀 Deployment successfully completed!"
